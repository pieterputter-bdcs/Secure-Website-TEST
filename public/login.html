<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Unit Converter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --accent:   #3b82f6;
      --accent-h: #2563eb;
      --text:     #f1f5f9;
      --muted:    #94a3b8;
      --error:    #ef4444;
      --success:  #22c55e;
      --radius:   10px;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      padding: 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 25px 50px rgba(0,0,0,.4);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo svg { width: 48px; height: 48px; margin-bottom: .75rem; }
    .logo h1 { font-size: 1.5rem; font-weight: 700; }
    .logo p  { color: var(--muted); font-size: .875rem; margin-top: .25rem; }

    label {
      display: block;
      font-size: .8125rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: .375rem;
    }

    input {
      display: block;
      width: 100%;
      padding: .625rem .875rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 1rem;
      transition: border-color .15s;
      margin-bottom: 1.25rem;
    }
    input:focus { outline: none; border-color: var(--accent); }

    button[type=submit] {
      width: 100%;
      padding: .75rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: .5rem;
    }
    button[type=submit]:hover  { background: var(--accent-h); }
    button[type=submit]:active { transform: scale(.99); }

    .alert {
      padding: .75rem 1rem;
      border-radius: 6px;
      font-size: .875rem;
      margin-bottom: 1.25rem;
      display: none;
    }
    .alert.error   { background: rgba(239,68,68,.15);  border: 1px solid var(--error);   color: var(--error); }
    .alert.success { background: rgba(34,197,94,.15);  border: 1px solid var(--success); color: var(--success); }
    .alert.visible { display: block; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .btn-text { display: none; }
    .loading .spinner  { display: inline-block; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="48" height="48" rx="12" fill="#3b82f6"/>
      <path d="M14 24h20M28 18l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M20 18l-6 6 6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>Unit Converter</h1>
    <p>Sign in to access your account</p>
  </div>

  <div id="alert" class="alert" role="alert"></div>

  <form id="loginForm" novalidate>
    <label for="username">Username</label>
    <input id="username" name="username" type="text" autocomplete="username"
           placeholder="Enter your username" required maxlength="64">

    <label for="password">Password</label>
    <input id="password" name="password" type="password" autocomplete="current-password"
           placeholder="Enter your password" required maxlength="128">

    <button type="submit" id="submitBtn">
      <span class="btn-text">Sign In</span>
      <span class="spinner"></span>
    </button>
  </form>
</div>

<script>
  // If already logged in, redirect
  (async () => {
    try {
      const r = await fetch('/api/auth/me');
      if (r.ok) {
        const { user } = await r.json();
        window.location.href = user.role === 'admin' ? '/admin' : '/converter';
      }
    } catch {}
  })();

  const form      = document.getElementById('loginForm');
  const alertEl   = document.getElementById('alert');
  const submitBtn = document.getElementById('submitBtn');

  function showAlert(msg, type) {
    alertEl.textContent = msg;
    alertEl.className = `alert ${type} visible`;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    alertEl.className = 'alert';

    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    if (!username || !password) {
      return showAlert('Please enter your username and password.', 'error');
    }

    submitBtn.classList.add('loading');
    submitBtn.disabled = true;

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (res.ok) {
        showAlert('Login successful! Redirecting…', 'success');
        setTimeout(() => {
          window.location.href = data.user.role === 'admin' ? '/admin' : '/converter';
        }, 600);
      } else {
        showAlert(data.error || 'Login failed.', 'error');
      }
    } catch {
      showAlert('Network error. Please try again.', 'error');
    } finally {
      submitBtn.classList.remove('loading');
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
